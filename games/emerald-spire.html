<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const log = document.getElementById('combat-log');

    let hero = { active: false, type: '', color: 'white', x: 450, y: 250, speed: 5, hp: 100, maxHP: 100, mp: 50, maxMP: 50, xp: 0, nextXP: 100, level: 1, str: 10, int: 10, con: 10, shield: 0 };
    let enemies = [];
    let currentEnemy = null;
    let keys = {};
    let gameState = "SELECT";
    let mySpells = []; 

    const SPELL_DATA = {
        'FIRE': { name: 'Fireball', cost: 12, req: 1, desc: 'Heavy Fire Dmg' },
        'ICE': { name: 'Ice Bolt', cost: 10, req: 1, desc: 'Dmg + Slow Enemy' },
        'SHOCK': { name: 'Shock', cost: 15, req: 2, desc: 'Dmg + Stun Chance' },
        'POISON': { name: 'Poison', cost: 10, req: 2, desc: 'Dmg over time' },
        'DRAIN': { name: 'Lifesteal', cost: 20, req: 3, desc: 'Steal HP' },
        'SHIELD': { name: 'Divine Shield', cost: 25, req: 3, desc: 'Block next hit' },
        'SMITE': { name: 'Holy Smite', cost: 18, req: 4, desc: 'High Magic Dmg' },
        'CHAIN': { name: 'Chain Light', cost: 22, req: 4, desc: 'Multi-hit Dmg' },
        'BERSERK': { name: 'Berserk', cost: 15, req: 5, desc: 'Buff STR this fight' },
        'METEOR': { name: 'Meteor', cost: 45, req: 6, desc: 'Massive Dmg' },
        'EXECUTE': { name: 'Execute', cost: 30, req: 7, desc: 'Insta-kill if <25% HP' }
    };

    function pickClass(cls, color) {
        hero.type = cls; hero.color = color; hero.active = true;
        document.getElementById('class-select').style.display = 'none';
        
        // MAGE: Glass Cannon, starts with Fireball
        if(cls === 'Mage') { 
            hero.int = 40; hero.hp = 80; hero.maxHP = 80;
            hero.mp = 200; hero.maxMP = 200;
            mySpells.push('FIRE'); 
        }
        // PALADIN: Tank, no starting spells but huge HP/Defense
        if(cls === 'Paladin') { 
            hero.str = 25; hero.con = 30; 
            hero.hp = 200; hero.maxHP = 200; 
            hero.mp = 60; hero.maxMP = 60;
        }
        // ROGUE: Fast, high critical potential
        if(cls === 'Rogue') { 
            hero.str = 20; hero.speed = 8; 
            hero.hp = 120; hero.maxHP = 120;
            hero.mp = 100; hero.maxMP = 100;
        }
        
        gameState = "EXPLORE";
        addLog(`The ${cls} has entered the Spire.`);
        spawnFloor();
        updateUI();
    }

    function addLog(t) {
        let div = document.createElement('div');
        div.innerText = `> ${t}`;
        log.prepend(div);
    }

    function spawnFloor() {
        enemies = [];
        for(let i=0; i<3; i++) {
            enemies.push({ x: Math.random()*800+50, y: Math.random()*400+50, hp: 60 + (hero.level * 20), maxHP: 60 + (hero.level * 20), atk: 12 + (hero.level * 4), alive: true });
        }
    }

    function startBattle(en) {
        gameState = "BATTLE";
        currentEnemy = en;
        hero.shield = 0;
        document.getElementById('battle-overlay').style.display = 'flex';
        toggleSpells(false);
        updateBattleUI();
    }

    function toggleSpells(show) {
        const sMenu = document.getElementById('spell-menu');
        if (!show) {
            document.getElementById('main-battle-menu').style.display = 'block';
            sMenu.style.display = 'none';
            return;
        }

        if (mySpells.length === 0) {
            document.getElementById('battle-info').innerText = "You have no spells yet! Level up to find some.";
            return;
        }

        document.getElementById('main-battle-menu').style.display = 'none';
        sMenu.style.display = 'grid';
        
        const backBtn = sMenu.lastElementChild;
        sMenu.innerHTML = '';
        mySpells.forEach(id => {
            const s = SPELL_DATA[id];
            const b = document.createElement('button');
            b.className = 'battle-btn';
            b.innerHTML = `${s.name} (${s.cost} MP)`;
            b.disabled = hero.mp < s.cost;
            b.onclick = () => playerAction(id);
            sMenu.appendChild(b);
        });
        sMenu.appendChild(backBtn);
    }

    function updateBattleUI() {
        document.getElementById('battle-stats').innerHTML = `
            <span style="color:white">HERO: ${Math.floor(hero.hp)} HP | ${Math.floor(hero.mp)} MP</span><br>
            <span style="color:red">MONSTER: ${Math.floor(currentEnemy.hp)} HP</span>
        `;
    }

    function playerAction(type) {
        let dmg = 0;
        let info = document.getElementById('battle-info');
        
        if (type === 'ATTACK') {
            dmg = hero.str + Math.floor(Math.random() * 10);
            currentEnemy.hp -= dmg;
            info.innerText = `You hit for ${dmg} damage!`;
        } else if (type === 'HEAL') {
            if (hero.mp < 15) return;
            hero.mp -= 15;
            let h = 40 + hero.int;
            hero.hp = Math.min(hero.maxHP, hero.hp + h);
            info.innerText = `Restored ${h} HP!`;
        } else {
            const s = SPELL_DATA[type];
            if (hero.mp < s.cost) return;
            hero.mp -= s.cost;
            
            if (type === 'FIRE') { dmg = hero.int + 25; currentEnemy.hp -= dmg; }
            if (type === 'ICE') { dmg = hero.int + 10; currentEnemy.hp -= dmg; currentEnemy.atk -= 3; }
            if (type === 'DRAIN') { dmg = hero.int; currentEnemy.hp -= dmg; hero.hp = Math.min(hero.maxHP, hero.hp + dmg); }
            if (type === 'SHIELD') { hero.shield = 1; }
            if (type === 'METEOR') { dmg = hero.int * 4; currentEnemy.hp -= dmg; }
            if (type === 'EXECUTE') {
                if (currentEnemy.hp / currentEnemy.maxHP < 0.25) { currentEnemy.hp = 0; info.innerText = "EXECUTED!"; }
                else { dmg = 15; currentEnemy.hp -= 15; info.innerText = "Execute failed!"; }
            }
            if (!info.innerText.includes("EXECUTED")) info.innerText = `Used ${s.name}!`;
        }

        updateUI(); updateBattleUI(); toggleSpells(false);
        if (currentEnemy.hp <= 0) setTimeout(victory, 800);
        else {
            document.getElementById('battle-overlay').style.pointerEvents = 'none';
            setTimeout(monsterTurn, 1000);
        }
    }

    function monsterTurn() {
        let dmg = Math.max(5, currentEnemy.atk - (hero.con / 3));
        if (hero.shield > 0) {
            dmg = 0; hero.shield = 0;
            document.getElementById('battle-info').innerText = "Shield blocked the hit!";
        } else {
            hero.hp -= dmg;
            document.getElementById('battle-info').innerText = `Monster hits for ${Math.floor(dmg)} damage!`;
        }
        document.getElementById('battle-overlay').style.pointerEvents = 'auto';
        updateUI(); updateBattleUI();
        if (hero.hp <= 0) { alert("YOU DIED"); location.reload(); }
    }

    function victory() {
        document.getElementById('battle-overlay').style.display = 'none';
        currentEnemy.alive = false;
        hero.xp += 50;
        if (hero.xp >= hero.nextXP) triggerLevelUp();
        else if (enemies.filter(e => e.alive).length === 0) { hero.level++; spawnFloor(); addLog(`Advancing to Floor ${hero.level}!`); }
        gameState = "EXPLORE";
    }

    function triggerLevelUp() {
        hero.level++;
        hero.xp = 0; hero.nextXP *= 1.8;
        gameState = "MENU";
        document.getElementById('modal-overlay').style.display = 'flex';
        const container = document.getElementById('modal-options');
        container.innerHTML = '';

        let available = Object.keys(SPELL_DATA).filter(id => !mySpells.includes(id) && hero.level >= SPELL_DATA[id].req);
        let choices = [];
        while(choices.length < 2 && available.length > 0) {
            let rand = available.splice(Math.floor(Math.random()*available.length), 1)[0];
            choices.push(rand);
        }

        choices.forEach(id => {
            let b = document.createElement('button');
            b.style.width = "100%"; b.style.margin = "5px";
            b.innerHTML = `LEARN: ${SPELL_DATA[id].name}<br><small>${SPELL_DATA[id].desc}</small>`;
            b.onclick = () => { mySpells.push(id); finalizeLevel(); };
            container.appendChild(b);
        });

        if (choices.length === 0) {
            let b = document.createElement('button');
            b.innerText = "Mastery: +15 Stats";
            b.onclick = () => { hero.str+=15; hero.int+=15; finalizeLevel(); };
            container.appendChild(b);
        }
    }

    function finalizeLevel() {
        hero.maxHP += 40; hero.hp = hero.maxHP;
        hero.maxMP += 30; hero.mp = hero.maxMP;
        document.getElementById('modal-overlay').style.display = 'none';
        if (enemies.filter(e => e.alive).length === 0) spawnFloor();
        gameState = "EXPLORE";
        updateUI();
    }

    function updateUI() {
        if(!hero.active) return;
        document.getElementById('stat-hp').innerText = `HP: ${Math.floor(hero.hp)}/${hero.maxHP}`;
        document.getElementById('stat-mp').innerText = `MP: ${Math.floor(hero.mp)}/${hero.maxMP}`;
        document.getElementById('stat-xp').innerText = `XP: ${Math.floor(hero.xp)}/${Math.floor(hero.nextXP)}`;
        document.getElementById('s-str').innerText = hero.str;
        document.getElementById('s-int').innerText = hero.int;
        document.getElementById('s-con').innerText = hero.con;
        document.getElementById('char-name').innerText = `LVL ${hero.level} ${hero.type}`;
    }

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function loop() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, 900, 500);
        if(gameState === "EXPLORE") {
            let moving = false;
            if(keys['ArrowUp'] && hero.y > 20) { hero.y -= hero.speed; moving = true; }
            if(keys['ArrowDown'] && hero.y < 480) { hero.y += hero.speed; moving = true; }
            if(keys['ArrowLeft'] && hero.x > 20) { hero.x -= hero.speed; moving = true; }
            if(keys['ArrowRight'] && hero.x < 880) { hero.x += hero.speed; moving = true; }
            
            // Subtle MP Regen while walking
            if (moving && hero.mp < hero.maxMP) hero.mp += 0.05;

            enemies.forEach(en => {
                if(!en.alive) return;
                ctx.fillStyle = "red"; ctx.fillRect(en.x - 12, en.y - 12, 24, 24);
                if(Math.abs(hero.x - en.x) < 25 && Math.abs(hero.y - en.y) < 25) startBattle(en);
            });
            updateUI();
        }
        if(hero.active) {
            ctx.fillStyle = hero.color; ctx.beginPath(); ctx.arc(hero.x, hero.y, 15, 0, Math.PI*2); ctx.fill();
        }
        requestAnimationFrame(loop);
    }
    loop();
</script>

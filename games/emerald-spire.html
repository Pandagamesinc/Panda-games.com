<div id="ui-layer">
    <div>
        <div id="char-name" style="color:gold">SELECT CLASS</div>
        <div class="hp-bar" id="stat-hp">HP: --</div>
        <div class="mp-bar" id="stat-mp">MP: --</div>
    </div>
    <div style="font-size: 12px;">
        <div>STR:<span id="s-str">--</span> INT:<span id="s-int">--</span> CON:<span id="s-con">--</span></div>
        <div id="stat-xp" style="color:#4444ff">XP: 0/100</div>
    </div>
    <div id="save-controls">
        <div style="color:#00ff41; font-weight:bold; margin-bottom:5px;">FLOOR: <span id="floor-num">1</span></div>
        <div id="class-select" style="display:flex; gap:2px;">
            <button class="btn" style="width:50px; padding:5px; font-size:10px;" onclick="pickClass('Mage', '#00d4ff')">MAGE</button>
            <button class="btn" style="width:50px; padding:5px; font-size:10px;" onclick="pickClass('Pala', '#fff')">PALA</button>
            <button class="btn" style="width:50px; padding:5px; font-size:10px;" onclick="pickClass('Arch', '#ffaa00')">ARCHER</button>
        </div>
        <div id="post-select-btns" style="display:none;">
            <button class="btn" style="width:70px" onclick="openSaveMenu()">SAVE</button>
            <button class="btn" style="width:70px" onclick="openLoadMenu()">LOAD</button>
        </div>
    </div>
</div>

<script>
    // ... (Keep existing Audio Engine and Variables) ...
    
    // NEW ARCHER SPELL
    const SPELL_DATA = {
        'FIRE': { name: 'Fireball', cost: 12, req: 1, desc: 'Reliable Magic Dmg' },
        'SNIPE': { name: 'Power Shot', cost: 15, req: 1, desc: 'Huge Physical Dmg' }, // Archer's starting spell
        'ICE': { name: 'Ice Bolt', cost: 10, req: 1, desc: 'Dmg + Weaken Atk' },
        'DRAIN': { name: 'Lifesteal', cost: 20, req: 3, desc: 'Steal HP' },
        'SHIELD': { name: 'Divine Shield', cost: 25, req: 3, desc: 'Block Next' },
        'METEOR': { name: 'Meteor', cost: 45, req: 6, desc: 'Massive Dmg' }
    };

    function pickClass(cls, color) {
        // Safe Audio Resume
        if (audio && audio.state === 'suspended') {
            audio.resume().catch(e => console.log("Audio blocked until interaction."));
        }

        hero.type = cls; 
        hero.color = color; 
        hero.active = true;
        
        // Hide class select, show Save/Load
        document.getElementById('class-select').style.display = 'none';
        document.getElementById('post-select-btns').style.display = 'block';
        
        if(cls === 'Mage') { 
            hero.int=45; hero.hp=80; hero.maxHP=80; hero.mp=200; hero.maxMP=200; 
            mySpells = ['FIRE']; 
        } else if(cls === 'Arch') {
            hero.str=35; hero.speed=7; hero.hp=110; hero.maxHP=110; hero.mp=80; hero.maxMP=80;
            mySpells = ['SNIPE'];
        } else { 
            hero.str=25; hero.con=30; hero.hp=180; hero.maxHP=180; hero.mp=60; hero.maxMP=60; 
            mySpells = [];
        }

        gameState = "EXPLORE"; 
        spawnFloor(); 
        updateUI();
        
        // Confirm with sound
        try { playNote(440, 'square', 0.2); } catch(e) {}
    }

    // UPDATE PLAYER ACTION TO INCLUDE SNIPE
    function playerAction(type) {
        let dmg = 0;
        if (type === 'ATTACK') {
            if (Math.random() < 0.05) {
                try { playNote(150, 'sawtooth', 0.1); } catch(e) {}
                document.getElementById('battle-info').innerText = `MISSED!`;
            } else {
                try { playNote(600, 'sine', 0.1); } catch(e) {}
                // Archer gets a slightly better physical multiplier (0.9 vs 0.7)
                let mult = (hero.type === 'Arch') ? 0.9 : 0.7;
                dmg = Math.floor(hero.str * mult) + Math.floor(Math.random() * 5);
                currentEnemy.hp -= dmg;
                spawnParticle(450, 150, `-${dmg}`, "white");
                document.getElementById('battle-info').innerText = `You hit for ${dmg}!`;
            }
        } else if (type === 'SNIPE') {
            const s = SPELL_DATA['SNIPE'];
            hero.mp -= s.cost;
            dmg = Math.floor(hero.str * 2.5); // Archer's big hit
            currentEnemy.hp -= dmg;
            spawnParticle(450, 150, `-${dmg}!!!`, "#ffaa00");
            document.getElementById('battle-info').innerText = `CRITICAL SNIPE: ${dmg}!`;
            try { playNote(800, 'square', 0.1); } catch(e) {}
        }
        // ... (Keep the rest of the spell logic and monsterTurn) ...
    }
</script>

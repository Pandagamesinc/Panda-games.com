<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EMERALD SPIRE: REGEN RPG</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; }
        #ui-layer { width: 800px; display: flex; justify-content: space-between; padding: 10px; background: #222; border: 2px solid #444; }
        #game-wrapper { position: relative; width: 800px; height: 400px; border: 4px solid #00ff41; margin-top: 10px; }
        canvas { background: #111; display: block; }
        #combat-log { width: 800px; height: 150px; background: #000; border: 2px solid #444; margin-top: 10px; overflow-y: auto; padding: 10px; font-size: 14px; box-sizing: border-box; }
        .regen-text { color: #44ff44; font-weight: bold; }
        .enemy-text { color: #ff4444; }
        .system-text { color: #aaa; font-style: italic; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="stat-hp">HP: 50/50</div>
    <div id="stat-mp">MP: 25/25</div>
    <div id="stat-floor">FLOOR: 1</div>
    <div id="stat-gold">GOLD: 50</div>
</div>

<div id="game-wrapper">
    <canvas id="gameCanvas" width="800" height="400"></canvas>
</div>

<div id="combat-log">
    <div class="system-text">Regen Active: +2 HP and +1 MP every 2 seconds while exploring!</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const log = document.getElementById('combat-log');

        x: 50, y: 200, size: 20, speed: 4, 
        hp: 50, maxHP: 50, mp: 25, maxMP: 25, 
        gold: 50, floor: 1, atk: 5, ac: 12
    };
    
    let monster = { x: 600, y: 180, size: 30 };
    let merchant = { x: 400, y: 50, size: 25, active: false };
    let gameState = "EXPLORE";
    let currentEnemy = null;

    // --- REGEN LOGIC ---
    // This runs every 2 seconds (2000ms)
    setInterval(() => {
        if (gameState === "EXPLORE") {
            let healed = false;
            
            // Health Regen (+2)
            if (hero.hp < hero.maxHP) {
                hero.hp = Math.min(hero.maxHP, hero.hp + 2);
                healed = true;
            }

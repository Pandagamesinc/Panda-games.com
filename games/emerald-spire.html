<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EMERALD SPIRE: UNIVERSAL EDITION</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; }
        #ui-layer { width: 900px; display: grid; grid-template-columns: 1.2fr 1fr 0.8fr 1fr; gap: 10px; padding: 15px; background: #111; border: 2px solid #444; margin-top: 5px; box-sizing: border-box; }
        #game-wrapper { position: relative; width: 900px; height: 500px; border: 4px solid #00ff41; margin-top: 10px; background: #000; }
        canvas { display: block; width: 100%; height: 100%; }
        #combat-log { width: 900px; height: 100px; background: #000; border: 2px solid #444; margin-top: 5px; overflow-y: auto; padding: 10px; font-size: 13px; box-sizing: border-box; }
        
        #modal-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10; }
        .menu-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; border: 3px solid #00ff41; padding: 20px; text-align: center; width: 400px; }
        .option { background: #333; border: 1px solid #00ff41; margin: 10px; padding: 10px; cursor: pointer; display: block; width: 95%; color: #00ff41; font-weight: bold; }
        .option:hover { background: #00ff41; color: #000; }
        
        .stat-val { color: #ffeb3b; }
        .hp-bar { color: #ff4444; font-weight: bold; }
        .mp-bar { color: #00d4ff; font-weight: bold; }
        button { cursor: pointer; background: #222; color: #00ff41; border: 1px solid #00ff41; padding: 8px; font-family: 'Courier New'; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div>
        <div id="char-name" style="color:gold">SELECT CLASS</div>
        <div class="hp-bar" id="stat-hp">HP: --</div>
        <div class="mp-bar" id="stat-mp">MP: --</div>
    </div>
    <div style="font-size: 11px;">
        <div>STR:<span id="s-str" class="stat-val">10</span> DEX:<span id="s-dex" class="stat-val">10</span> CON:<span id="s-con" class="stat-val">10</span></div>
        <div>INT:<span id="s-int" class="stat-val">10</span> WIS:<span id="s-wis" class="stat-val">10</span></div>
        <div id="stat-xp" style="color:#4444ff">XP: 0/100</div>
    </div>
    <div>
        <div id="stat-floor" style="color: #00ff41;">FLOOR: 1</div>
        <div id="stat-gold" style="color:gold">GOLD: 0</div>
    </div>
    <div id="class-select">
        <button onclick="pickClass('Mage', '#00d4ff')">Blue (Mage)</button>
        <button onclick="pickClass('Paladin', '#ffffff')">White (Paladin)</button>
        <button onclick="pickClass('Rogue', '#ff00ff')">Purple (Rogue)</button>
        <button onclick="pickClass('Archer', '#44ff44')">Green (Archer)</button>
    </div>
</div>

<div id="game-wrapper">
    <canvas id="gameCanvas" width="900" height="500"></canvas>
    <div id="modal-overlay">
        <div id="modal-content" class="menu-box">
            <h3 id="modal-title" style="color:gold">LEVEL UP</h3>
            <div id="modal-options"></div>
        </div>
    </div>
</div>

<div id="combat-log">
    <div style="color:#888">Choose a class above to start...</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const log = document.getElementById('combat-log');

    let hero = { active: false, type: '', color: 'white', x: 450, y: 250, size: 20, speed: 5, hp: 100, maxHP: 100, mp: 50, maxMP: 50, xp: 0, nextXP: 100, level: 1, gold: 0, floor: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10 };
    let enemies = [];
    let keys = {};
    let gameState = "SELECT";

    function pickClass(cls, color) {
        hero.type = cls; hero.color = color; hero.active = true;
        document.getElementById('class-select').style.display = 'none';
        if(cls === 'Mage') { hero.int=20; hero.hp=70; hero.mp=120; }
        if(cls === 'Paladin') { hero.str=18; hero.con=18; hero.hp=140; hero.mp=40; }
        if(cls === 'Rogue') { hero.dex=20; hero.hp=90; hero.mp=60; }
        if(cls === 'Archer') { hero.dex=20; hero.wis=15; hero.hp=100; hero.mp=70; }
        hero.maxHP = hero.hp; hero.maxMP = hero.mp;
        gameState = "EXPLORE";
        addLog(`Started as ${cls}. Use Arrows to move!`, "gold");
        spawnFloor();
        updateUI();
    }

    function addLog(t, color) {
        let div = document.createElement('div');
        div.style.color = color || "#00ff41";
        div.innerText = `> ${t}`;
        log.prepend(div);
    }

    function spawnFloor() {
        enemies = [];
        let count = 2 + Math.floor(hero.floor / 3);
        for(let i=0; i<count; i++) {
            enemies.push({
                x: Math.random()*800+50, y: Math.random()*400+50,
                hp: 20 + (hero.floor * 15), atk: 5 + (hero.floor * 2),
                alive: true, color: '#ff4444'
            });
        }
    }

    function startCombat(en) {
        gameState = "COMBAT";
        let heroAtk = (hero.str * 1) + (hero.int * 0.5);
        let fight = setInterval(() => {
            en.hp -= heroAtk;
            hero.hp -= Math.max(1, en.atk - (hero.con / 2));
            updateUI();
            if (en.hp <= 0) {
                clearInterval(fight); en.alive = false;
                hero.xp += 25; hero.gold += 10;
                addLog(`Enemy Defeated! +25 XP`, "#44ff44");
                if (hero.xp >= hero.nextXP) triggerLevelUp();
                if (enemies.filter(e => e.alive).length === 0) { hero.floor++; spawnFloor(); addLog(`Floor ${hero.floor} reached!`, "gold"); }
                gameState = "EXPLORE";
            }
            if (hero.hp <= 0) { clearInterval(fight); alert("GAME OVER"); location.reload(); }
        }, 500);
    }

    function triggerLevelUp() {
        hero.level++; hero.xp = 0; hero.nextXP *= 1.5;
        gameState = "MENU";
        document.getElementById('modal-overlay').style.display = 'block';
        const container = document.getElementById('modal-options');
        container.innerHTML = '';
        [{l: "STR+5", a: () => hero.str += 5}, {l: "VIT+20", a: () => {hero.maxHP += 20; hero.hp = hero.maxHP;}}].forEach(opt => {
            let b = document.createElement('button'); b.className = 'option'; b.innerText = opt.l;
            b.onclick = () => { opt.a(); document.getElementById('modal-overlay').style.display = 'none'; gameState = "EXPLORE"; updateUI(); };
            container.appendChild(b);
        });
    }

    function updateUI() {
        if(!hero.active) return;
        document.getElementById('stat-hp').innerText = `HP: ${Math.floor(hero.hp)}/${hero.maxHP}`;
        document.getElementById('stat-mp').innerText = `MP: ${Math.floor(hero.mp)}/${hero.maxMP}`;
        document.getElementById('stat-xp').innerText = `XP: ${Math.floor(hero.xp)}/${Math.floor(hero.nextXP)}`;
        document.getElementById('stat-floor').innerText = `FLOOR: ${hero.floor}`;
        document.getElementById('stat-gold').innerText = `GOLD: ${hero.gold}`;
        document.getElementById('char-name').innerText = `LVL ${hero.level} ${hero.type}`;
        ['str','dex','con','int','wis'].forEach(s => document.getElementById('s-'+s).innerText = hero[s]);
    }

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function loop() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, 900, 500);

        if(gameState === "EXPLORE") {
            if(keys['ArrowUp'] && hero.y > 20) hero.y -= hero.speed;
            if(keys['ArrowDown'] && hero.y < 480) hero.y += hero.speed;
            if(keys['ArrowLeft'] && hero.x > 20) hero.x -= hero.speed;
            if(keys['ArrowRight'] && hero.x < 880) hero.x += hero.speed;

            enemies.forEach(en => {
                if(!en.alive) return;
                ctx.fillStyle = en.color;
                ctx.fillRect(en.x, en.y, 25, 25); // Draw Red Square for Monsters
                if(Math.abs(hero.x - en.x) < 25 && Math.abs(hero.y - en.y) < 25) startCombat(en);
            });
        }

        if(hero.active) {
            ctx.fillStyle = hero.color;
            ctx.beginPath();
            ctx.arc(hero.x, hero.y, 15, 0, Math.PI*2); // Draw Circle for Hero
            ctx.fill();
        }
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>

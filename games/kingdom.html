<!DOCTYPE html>
<html>
<head>
    <title>Sovereign: Compatibility Mode</title>
    <style>
        body { background: #000; color: #cdbe8c; font-family: sans-serif; margin: 0; overflow: hidden; }
        #controls { position: absolute; top: 10px; left: 10px; z-index: 1000; background: rgba(0,0,0,0.8); padding: 15px; border: 1px solid #cdbe8c; border-radius: 5px; width: 250px; }
        #gameCanvas { background: #050505; display: block; border: 1px solid #222; }
        .stat { margin-bottom: 5px; font-size: 14px; }
        .btn { background: #cdbe8c; color: #000; border: none; padding: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn:hover { background: #fff; }
        #action-box { margin-top: 15px; padding-top: 15px; border-top: 1px solid #444; }
    </style>
</head>
<body>

    <div id="controls">
        <div class="stat">ENERGY: <span id="e-val">100</span></div>
        <div class="stat">TURN: <span id="t-val">1</span></div>
        <button class="btn" style="background:#00ffcc" onclick="forceDraw()">FORCE DRAW MAP</button>
        <button class="btn" onclick="nextTurn()">END TURN</button>
        
        <div id="action-box">
            <div id="sel-name" style="font-weight:bold; color:#fff">No Selection</div>
            <div id="btns"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Settings
        const HEX_SIZE = 35;
        const GRID_W = 15;
        const GRID_H = 10;
        
        let game = {
            energy: 100, turn: 1,
            grid: [], settler: {q: 7, r: 5},
            selected: null
        };

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            for(let r=0; r<GRID_H; r++) {
                game.grid[r] = [];
                for(let q=0; q<GRID_W; q++) {
                    game.grid[r][q] = {
                        type: Math.random() > 0.8 ? 'MTN' : 'PLN',
                        city: false,
                        farm: false
                    };
                }
            }

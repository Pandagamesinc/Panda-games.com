<!DOCTYPE html>
<html>
<head>
    <title>Sovereign Stratagem: Eternal Empire</title>
    <style>
        body { background: #050505; color: #00ffcc; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        #game-ui { position: absolute; top: 10px; left: 10px; width: 360px; background: rgba(10,10,15,0.98); border: 1px solid #00ffcc; padding: 15px; z-index: 100; border-radius: 8px; box-shadow: 0 0 20px rgba(0,255,204,0.2); }
        #map-canvas { background: #000; cursor: crosshair; }
        .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .res-box { background: #111; padding: 10px; border-radius: 4px; border-bottom: 2px solid #00ffcc; }
        .label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .val { font-size: 18px; font-weight: bold; color: #fff; }
        .tabs { display: flex; gap: 4px; margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 8px; font-size: 11px; background: #222; color: #aaa; border: 1px solid #444; cursor: pointer; border-radius: 4px; }
        .tab-btn.active { background: #00ffcc; color: #000; border-color: #fff; font-weight: bold; }
        .pane { display: none; } .pane.active { display: block; }
        .btn { background: #00ffcc; color: #000; border: none; padding: 12px; cursor: pointer; margin-top: 6px; width: 100%; font-weight: bold; border-radius: 4px; transition: 0.2s; }
        .btn:hover { background: #fff; transform: translateY(-1px); }
        .btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        .log { height: 120px; background: #000; border: 1px solid #222; overflow-y: scroll; font-size: 11px; margin-top: 10px; padding: 8px; color: #00ffcc; border-radius: 4px; }
    </style>
</head>

            <div class="res-box"><div class="label">Army Power</div><div class="val" id="ui-atk">0</div></div>
        </div>

            <button class="tab-btn" id="tab-intel" onclick="showTab('intel')">Intel</button>
        </div>

<!DOCTYPE html>
<html>
<head>
    <title>Sovereign Stratagem: Civ Edition</title>
    <style>
        body { background: #08080c; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        #ui-layer { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 900px; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
        #top-bar { position: absolute; top: 0; width: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: space-around; padding: 10px; border-bottom: 2px solid #cdbe8c; }
        #action-bar { background: rgba(20, 25, 35, 0.95); border: 2px solid #cdbe8c; padding: 15px; display: flex; gap: 15px; border-radius: 10px; box-shadow: 0 0 20px #000; }
        .stat { font-weight: bold; color: #cdbe8c; text-shadow: 1px 1px #000; }
        .unit-card { width: 120px; background: #1a1a1a; border: 1px solid #444; padding: 10px; text-align: center; cursor: pointer; border-radius: 5px; }
        .unit-card:hover { border-color: #cdbe8c; background: #2a2a2a; }
        .unit-card.selected { border: 2px solid #00ffcc; box-shadow: 0 0 10px #00ffcc; }
        #map-canvas { background: #000; }
        .btn { background: #cdbe8c; color: #000; border: none; padding: 8px 15px; font-weight: bold; cursor: pointer; border-radius: 3px; }
        .btn:hover { background: #fff; }
    </style>
</head>

        </div>
    </div>

<!DOCTYPE html>
<html>
<head>
    <title>Sovereign VI: Recovery</title>
    <style>
        /* Minimalist CSS to prevent rendering conflicts */
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; padding: 0; }
        #debug-ui { position: absolute; top: 10px; left: 10px; background: rgba(0,20,0,0.8); padding: 10px; border: 1px solid #0f0; z-index: 100; font-size: 12px; }
        #actions-panel { position: absolute; bottom: 10px; left: 10px; background: rgba(0,20,0,0.8); padding: 10px; border: 1px solid #0f0; z-index: 100; width: 250px; }
        canvas { display: block; border: 1px solid #222; }
        .btn { background: #0f0; color: #000; border: none; padding: 5px 10px; cursor: pointer; font-weight: bold; margin: 2px; }
        .btn:hover { background: #fff; }
    </style>
</head>
<body onload="boot()">

    <div id="debug-ui">
        SOVEREIGN VI RECOVERY<br>
        ENERGY: <span id="e">200</span> | SCI: <span id="s">0</span> | TURN: <span id="t">1</span><br>
        <button class="btn" onclick="endTurn()">NEXT TURN</button>
        <button class="btn" style="background:red; color:white;" onclick="boot()">MANUAL REBOOT</button>
    </div>

    <div id="actions-panel">
        <div id="msg">Initializing...</div>
        <div id="btns"></div>
    </div>

    <canvas id="gc"></canvas>

    <script>
        const canvas = document.getElementById('gc');
        const ctx = canvas.getContext('2d');
        const H = 40; // Hex Size

        let state = {
            e: 250, s: 0, t: 1, era: 0,
            grid: [], units: [], sel: null
        };

        const DATA = {
            'SETTLER': { sym: 'S', col: '#fff', m: 2, v: 2, cost: 100, era: 0 },
            'WARRIOR': { sym: 'W', col: '#f00', m: 2, v: 2, cost: 40, era: 0 },
            'KNIGHT':  { sym: 'K', col: '#ff0', m: 4, v: 2, cost: 120, era: 1 },
            'TANK':    { sym: 'T', col: '#888', m: 3, v: 3, cost: 300, era: 2 },
            'CYBORG':  { sym: 'X', col: '#0ff', m: 4, v: 4, cost: 500, era: 3 }
        };

        function boot() {
            // Force Canvas Size
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Build simple grid
            state.grid = [];
            for(let r=0; r<10; r++) {
                for(let q=0; q<12; q++) {
                    state.grid.push({ q, r, type: Math.random() > 0.9 ? 'M' : 'P', seen: false, city: false });
                }
            }

            // Reset Units
            state.units = [];
            spawn(2, 2, 'SETTLER');
            spawn(3, 2, 'WARRIOR');
            
            update();
            console.log("Game Booted");
        }

        function spawn(q, r, type) {
            state.units.push({ id: Math.random(), q, r, type, moves: DATA[type].m });
            reveal(q, r, DATA[type].v);
        }

        function reveal(cq, cr, range) {
            state.grid.forEach(t => {
                if (Math.abs(cq - t.q) + Math.abs(cr - t.r) <= range) t.seen = true;
            });
        }

        function getXY(q, r) {
            const ox = 50; 
            const oy = 80;
            return { x: ox + (q * H * 1.5), y: oy + (H * 1.73 * (r + 0.5 * (q % 2))) };
        }

        function update() {
            // Background
            ctx.fillStyle = "#000";
            ctx.fillRect(0,0,canvas.width, canvas.height);

            // Draw Tiles
            state.grid.forEach(t => {
                const {x, y} = getXY(t.q, t.r);
                ctx.beginPath();
                for(let i=0; i<6; i++) ctx.lineTo(x + H * Math.cos(i * Math.PI/3), y + H * Math.sin(i * Math.PI/3));
                ctx.closePath();
                ctx.fillStyle = t.seen ? (t.type === 'M' ? "#333" : "#020") : "#050505";
                ctx.fill();
                ctx.strokeStyle = (state.sel && state.sel.q === t.q && state.sel.r === t.r) ? "#0f0" : "#111";
                ctx.stroke();
                if(t.seen && t.city) { ctx.fillStyle="#fff"; ctx.fillText("CITY", x-12, y+5); }
            });

            // Draw Units
            state.units.forEach(u => {
                const {x, y} = getXY(u.q, u.r);
                ctx.fillStyle = u.moves > 0 ? DATA[u.type].col : "#444";
                ctx.beginPath(); ctx.arc(x, y, 12, 0, 7); ctx.fill();
                ctx.fillStyle = "#000"; ctx.fillText(DATA[u.type].sym, x-4, y+4);
            });

            document.getElementById('e').innerText = state.e;
            document.getElementById('s').innerText = state.s;
            document.getElementById('t').innerText = state.t;
        }

        canvas.onclick = (e) => {
            state.grid.forEach(t => {
                const {x, y} = getXY(t.q, t.r);
                if(Math.sqrt((e.clientX-x)**2 + (e.clientY-y)**2) < H) {
                    const uAt = state.units.find(u => u.q === t.q && u.r === t.r);
                    if(state.sel && state.sel.u && !uAt) {
                        // Move
                        if(state.sel.u.moves > 0) {
                            state.sel.u.q = t.q; state.sel.u.r = t.r;
                            state.sel.u.moves--; reveal(t.q, t.r, DATA[state.sel.u.type].v);
                            state.sel = null;
                        }
                    } else {
                        state.sel = uAt ? {u: uAt, q: t.q, r: t.r} : {t: t, q: t.q, r: t.r};
                    }
                    update();
                    ui();
                }
            });
        };

            const btns = document.getElementById('btns');
            const msg = document.getElementById('msg');
            btns.innerHTML = '';
            
            if(!

<!DOCTYPE html>
<html>
<head>
    <title>Sovereign VI: Eras</title>
    <style>
        body { background: #050508; color: #cdbe8c; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        #boot-layer { position: fixed; inset: 0; background: radial-gradient(circle, #1a1a2e 0%, #000 100%); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #ui-top { position: absolute; top: 0; width: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; gap: 20px; padding: 12px; border-bottom: 2px solid #cdbe8c; z-index: 500; font-size: 13px; }
        #control-panel { position: absolute; bottom: 20px; left: 20px; width: 300px; background: rgba(10, 15, 25, 0.95); border: 2px solid #cdbe8c; padding: 15px; border-radius: 8px; z-index: 500; box-shadow: 0 0 20px #000; }
        .stat-box { display: flex; align-items: center; gap: 5px; font-weight: bold; }
        .btn { background: #cdbe8c; color: #000; border: none; padding: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 5px; border-radius: 3px; text-transform: uppercase; }
        .btn:hover { background: #fff; }
        .prod-item { background: #1a1a1a; border: 1px solid #333; padding: 8px; margin-top: 4px; cursor: pointer; font-size: 11px; border-radius: 3px; }
        .prod-item:hover { border-color: #00ffcc; background: #222; }
        .locked { opacity: 0.5; cursor: not-allowed; font-style: italic; }
        #era-banner { color: #00ffcc; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <div id="boot-layer">
        <h1 style="letter-spacing: 10px;">SOVEREIGN VI</h1>
        <p id="boot-status">Systems Ready...</p>
        <button class="btn" style="width: 200px;" onclick="startGame()">ENTER WORLD</button>
    </div>

    <div id="ui-top">
        <div class="stat-box">⚡<span id="res-e">200</span></div>
        <div class="stat-box">⚛️<span id="res-s">0</span></div>
        <div class="stat-box">🪵<span id="res-w">0</span></div>
        <div class="stat-box">🪨<span id="res-st">0</span></div>
        <div class="stat-box">TURN: <span id="turn-val">1</span></div>
        <button class="btn" style="width: 100px; margin: 0; background: #00ffcc;" onclick="processTurn()">END TURN</button>
    </div>

    <div id="control-panel">
        <div id="era-banner">Ancient Era</div>
        <div id="sel-title" style="font-size: 16px; margin-bottom: 8px;">Awaiting Input</div>
        <div id="action-list"></div>
    </div>

    <canvas id="gameMap"></canvas>

            }
        };

        let state = {
            e: 200, s: 0, w: 0, st: 0,
            turn: 1, era: 'ANCIENT',
            grid: [], units: [], selected: null, pending: null

        function startGame() {
            document.getElementById('boot-layer').style.display = 'none';
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            // Map Generation
            for(let r=0; r<12; r++) {
                state.grid[r] = [];
                for(let q=0; q<16; q++) {
                    let type = Math.random() > 0.85 ? 'MTN' : 'PLN';
                    let res = Math.random() > 0.8 ? (type === 'MTN' ? 'STONE' : 'WOOD') : null;
                    state.grid[r][q] = { q, r, type, res, explored: false, owner: null, city: false };
                }
            }

            spawnUnit(5, 5, 'SETTLER');
            spawnUnit(6, 5, 'SCOUT');
            updateVision();
            draw();
        }

        function spawnUnit(q, r, type) {
            state.units.push({ id: Math.random(), q, r, type, moves: CIV_DATA.UNITS[type].moves });
            state.grid[r][q].explored = true;
        }

        function updateVision() {
            state.units.forEach(u => {
                const vis = CIV_DATA.UNITS[u.type].vision;

                    if(Math.abs(u.q-q) + Math.abs(u.r-r) <= vis) state.grid[r][q].explored = true;
                }
            });

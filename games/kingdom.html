<!DOCTYPE html>
<html>
<head>
    <title>Sovereign VI: Stability</title>
    <style>
        body { background: #050508; color: #cdbe8c; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; overflow: hidden; }
        #boot-layer { position: fixed; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #ui-top { position: absolute; top: 0; width: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: space-around; padding: 15px; border-bottom: 2px solid #cdbe8c; z-index: 500; }
        #control-panel { position: absolute; bottom: 20px; left: 20px; width: 320px; background: rgba(15, 20, 30, 0.98); border: 2px solid #cdbe8c; padding: 20px; border-radius: 10px; z-index: 500; box-shadow: 0 0 15px #000; }
        .stat { font-size: 14px; font-weight: bold; margin: 0 10px; }
        .btn { background: #cdbe8c; color: #000; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 8px; border-radius: 4px; text-transform: uppercase; font-size: 12px; }
        .btn:hover { background: #fff; }
        #log { font-size: 11px; color: #00ffcc; margin-top: 10px; height: 45px; overflow: hidden; border-top: 1px solid #333; padding-top: 5px; }
        canvas { display: block; cursor: crosshair; }
        .prod-item { background: #222; border: 1px solid #444; padding: 8px; margin-top: 5px; cursor: pointer; border-radius: 4px; font-size: 11px; }
    </style>
</head>
<body>

    <div id="boot-layer">
        <h1 style="letter-spacing: 8px; color: #cdbe8c;">SOVEREIGN VI</h1>
        <p style="color: #666;">Resource Engine & Territory Protocol Loaded</p>
        <button class="btn" style="width: 280px; height: 50px; font-size: 16px;" onclick="initGame()">BEGIN RECLAMATION</button>
    </div>

    <div id="ui-top">
        <div class="stat">⚡ <span id="res-energy">250</span></div>
        <div class="stat">🪵 <span id="res-wood">0</span></div>
        <div class="stat">🪨 <span id="res-stone">0</span></div>
        <div class="stat">💎 <span id="res-lux">0</span></div>
        <div class="stat">TURN: <span id="turn-val">1</span></div>
        <button class="btn" style="width: 120px; margin: 0; background: #00ffcc;" onclick="processTurn()">END TURN</button>
    </div>

    <div id="control-panel">
        <div id="sel-title" style="font-size: 18px; border-bottom: 1px solid #444; padding-bottom: 5px;">Awaiting Selection</div>
        <div id="action-list"></div>
        <div id="log">> Satellite uplink stable.</div>
    </div>

    <canvas id="gameMap"></canvas>

    <script>
        const canvas = document.getElementById('gameMap');
        const ctx = canvas.getContext('2d');
        const HEX_SIZE = 42;

        let state = {
            energy: 250, wood: 0, stone: 0, lux: 0,
            turn: 1, grid: [], units: [], selected: null,
            pendingAction: null, unitIdCounter: 100
        };

        const ICONS = { WOOD: '🌲', STONE: '⛰️', GEMS: '💎', GOLD: '🪙', CITY: '🏛️', FARM: '🚜' };
        const UNIT_DATA = {
            'SETTLER': { symbol: 'S', color: '#fff', vision: 2, moves: 2, cost: { energy: 100 } },
            'WARRIOR': { symbol: 'W', color: '#ff4444', vision: 2, moves: 2, cost: { energy: 40 } },
            'SCOUT':   { symbol: 'Sc', color: '#ffcc00', vision: 3, moves: 3, cost: { energy: 30 } },
            'ARCHER':  { symbol: 'A', color: '#9944ff', vision: 2, moves: 2, cost: { energy: 50, wood: 20 } },
            'CATAPULT':{ symbol: 'Ct', color: '#888', vision: 1, moves: 1, cost: { energy: 80, stone: 40 } }
        };

        function initGame() {
            document.getElementById('boot-layer').style.display = 'none';
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Generate Grid
            for(let r=0; r<12; r++) {
                state.grid[r] = [];
                for(let q=0; q<16; q++) {
                    let type = Math.random() > 0.88 ? 'MTN' : 'PLN';
                    let res = null;
                    if(type === 'PLN' && Math.random() > 0.75) {
                        let rIdx = Math.random();
                        res = rIdx > 0.9 ? 'GEMS' : (rIdx > 0.7 ? 'GOLD' : 'WOOD');
                    } else if(type === 'MTN') { res = 'STONE'; }
                    
                    state.grid[r][q] = { q, r, type, res, explored: false, owner: null, improvement: null, queue: null, progress: 0 };
                }
            }

            spawnUnit(4, 4, 'SETTLER');
            spawnUnit(5, 4, 'SCOUT');
            updateVision();
            draw();
        }

        function spawnUnit(q, r, type) {
            state.units.push({ id: state.unitIdCounter++, q, r, type, moves: UNIT_DATA[type].moves });
            state.grid[r][q].explored = true;
        }

        function updateVision() {
            state.units.forEach(u => {
                const vRange = UNIT_DATA[u.type].vision;
                for(let r=0; r<12; r++) {
                    for(let q=0; q<16; q++) {
                        if(Math.abs(u.q - q) + Math.abs(u.r - r) <= vRange) state.grid[r][q].explored = true;
                    }
                }
            });
        }

        function getHexXY(q, r) {
            const offX = (canvas.width/2) - (8 * HEX_SIZE * 1.5);
            const offY = (canvas.height/2) - (6 * HEX_SIZE * 1.7);
            return { x: offX + (HEX_SIZE * 1.5 * q), y: offY + (HEX_SIZE * 1.73 * (r + 0.5 * (q % 2))) };
        }

        function draw() {
            ctx.fillStyle = "#000"; ctx.fillRect(0,0,canvas.width, canvas.height);
            state.grid.flat().forEach(t => {
                const {x, y} = getHexXY(t.q, t.r

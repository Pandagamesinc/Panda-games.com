<!DOCTYPE html>
<html>
<head>
    <title>Sovereign VI: Absolute Zero</title>
    <style>
        body { background: #000; color: #cdbe8c; font-family: 'Courier New', Courier, monospace; margin: 0; overflow: hidden; }
        /* Static UI that exists before JS loads */
        #boot-layer { position: fixed; inset: 0; background: #000; z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 5px solid #111; }
        #game-ui { display: none; position: absolute; top: 0; width: 100%; height: 100%; pointer-events: none; }
        .panel { pointer-events: auto; background: rgba(0,0,0,0.9); border: 1px solid #cdbe8c; padding: 10px; }
        #top-bar { display: flex; justify-content: center; gap: 20px; width: 100%; border-bottom: 2px solid #cdbe8c; }
        #side-panel { position: absolute; bottom: 20px; left: 20px; width: 250px; min-height: 150px; }
        .btn { background: #cdbe8c; color: #000; border: none; padding: 10px; cursor: pointer; font-weight: bold; width: 100%; margin: 4px 0; font-family: inherit; }
        .btn:hover { background: #fff; }
        canvas { display: block; background: #050505; }
        .stat { font-weight: bold; color: #00ffcc; }
    </style>
</head>
<body>

    <div id="boot-layer">
        <h1 style="letter-spacing: 5px;">SOVEREIGN VI</h1>
        <p style="color: #666; font-size: 12px;">CORE PROTOCOL v4.0</p>
        <button id="start-trigger" class="btn" style="width: 200px; height: 50px;" onclick="manualStart()">MANUAL OVERRIDE START</button>
        <p id="status-text" style="color: #444; font-size: 10px; margin-top: 20px;">READY FOR INPUT</p>
    </div>

    <div id="game-ui">
        <div id="top-bar" class="panel">
            <div class="stat">ENG: <span id="e-val">200</span></div>
            <div class="stat">SCI: <span id="s-val">0</span></div>
            <div class="stat">FAITH: <span id="f-val">0</span></div>
            <div class="stat">TURN: <span id="t-val">1</span></div>
            <button class="btn" style="width: 80px; margin: 0; background: #00ffcc;" onclick="endTurn()">NEXT</button>
        </div>

        <div id="side-panel" class="panel">
            <div id="era-name" style="font-size: 10px; color: #888;">ERA: ANCIENT

<!DOCTYPE html>
<html>
<head>
    <title>JS Grand Prix: Circuit Pro</title>
    <style>
        body { background: #111; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; overflow: hidden; }
        canvas { background: #222; border: 4px solid #444; display: block; margin: 0 auto; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        #ui { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 10px 25px; border-radius: 30px; border: 2px solid #00ff41; font-weight: bold; font-size: 20px; z-index: 10; }
    </style>
</head>
<body>

<div id="ui">🏁 Lap: <span id="lap">1</span>/3 | 💰 Coins: <span id="coins">0</span></div>
<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- WORLD SETTINGS ---
const WORLD_HEIGHT = 4000; // Even longer track!
const TRACK_WIDTH = 350;

let gameState = { coins: 0, lap: 1, cameraY: 0, playing: true };
let player = { x: 400, y: 3800, speed: 0, maxSpeed: 10, accel: 0.25, friction: 0.97, color: "#00f2ff" };
let ai = { x: 350, y: 3800, speed: 7.2, color: "#ffeb3b" };
let keys = {};

window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;

// --- CURVE LOGIC ---
// This function calculates where the track center is at any given Y position
function getTrackX(y) {
    return 400 + Math.sin(y / 400) * 120; 
}

function update() {
    if (!gameState.playing) return;

    // Movement & Physics
    if (keys["ArrowUp"]) player.speed = Math.min(player.speed + player.accel, player.maxSpeed);
    if (keys["ArrowDown"]) player.speed -= player.accel;
    player.speed *= player.friction;
    player.y -= player.speed;

    if (keys["ArrowLeft"]) player.x -= 6;
    if (keys["ArrowRight"]) player.x += 6;

    // AI Follows the curve perfectly
    ai.y -= ai.speed;
    ai.x = getTrackX(ai.y) - 30;

    // Off-Road Penalty
    let trackCenter = getTrackX(player.y);
    if (player.x < trackCenter - TRACK_WIDTH/2 || player.x > trackCenter + TRACK_WIDTH/2) {
        player.speed *= 0.92; // Slow down on grass
    }

    // Camera Follow
    gameState.cameraY = player.y - 400;

    // Finish Line
    if (player.y < 150) {
        if (gameState.lap < 3) {
            gameState.lap++;
            player.y = 3800; ai.y = 3800;
            document.getElementById('lap').innerText = gameState.lap;
        } else {
            alert("GRAND PRIX CHAMPION! +200 Coins");
            gameState.coins += 200;
            location.reload();
        }
    }
}

function drawMinimap() {
    const miniW = 80;
    const miniH = 150;
    const miniX = canvas.width - 100;
    const miniY = 50;

    // Background
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(miniX, miniY, miniW, miniH);
    ctx.strokeStyle = "#555";
    ctx.strokeRect(miniX, miniY, miniW, miniH);

    // Scaling factor (World to Minimap)
    const scale = miniH / WORLD_HEIGHT;

    // AI Dot
    ctx.fillStyle = ai.color;
    ctx.beginPath();
    ctx.arc(miniX + miniW/2, miniY + (ai.y * scale), 4, 0, Math.PI*2);
    ctx.fill();

    // Player Dot
    ctx.fillStyle = player.color;
    ctx.beginPath();
    ctx.arc(miniX + miniW/2, miniY + (player.y * scale), 5, 0, Math.PI*2);
    ctx.fill();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(0, -gameState.cameraY);

    // Draw Grass
    ctx.fillStyle = "#1a4a1a";
    ctx.fillRect(0, -500, canvas.width, WORLD_HEIGHT + 1000);

    // Draw Track in segments to create curves
    for (let i = 0; i < WORLD_HEIGHT; i += 20) {
        ctx.fillStyle = (Math.floor(i/100) % 2 === 0) ? "#333" : "#3a3a3a"; // Alternating asphalt
        let tx = getTrackX(i);
        ctx.fillRect(tx - TRACK_WIDTH/2, i, TRACK_WIDTH, 22);
    }

    // Finish Line
    ctx.fillStyle = "white";
    let fX = getTrackX(150);
    for(let i=0; i<10; i++) ctx.fillRect(fX - TRACK_WIDTH/2 + (i*35), 150, 20, 20);

    // Entities
    ctx.fillStyle = ai.color;
    ctx.fillRect(ai.x, ai.y, 30, 50);
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, 30, 50);

    ctx.restore();

    drawMinimap();
    update();
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>

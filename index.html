<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMERALD SPIRE: STALKING SHADOWS</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; }
        #ui-layer { width: 900px; display: grid; grid-template-columns: 1fr 1fr 1.2fr; gap: 10px; padding: 15px; background: #111; border: 2px solid #444; margin-top: 5px; box-sizing: border-box; }
        #game-wrapper { position: relative; width: 900px; height: 500px; border: 4px solid #00ff41; margin-top: 10px; background: #000; }
        canvas { display: block; width: 100%; height: 100%; background: black; }
        #combat-log { width: 900px; height: 100px; background: #000; border: 2px solid #444; margin-top: 5px; overflow-y: auto; padding: 10px; font-size: 12px; box-sizing: border-box; }
        #battle-overlay, #merchant-overlay, #modal-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 20; flex-direction: column; align-items: center; justify-content: center; }
        .menu-box { border: 2px solid gold; padding: 20px; background: #111; text-align: center; width: 500px; }
        .btn { background: #222; color: #00ff41; border: 1px solid #00ff41; padding: 10px; margin: 4px; width: 150px; cursor: pointer; font-family: 'Courier New'; font-weight: bold; }
        .btn:hover:not(:disabled) { background: #00ff41; color: #000; }
        #spell-menu { display: none; grid-template-columns: 1fr 1fr; gap: 5px; }
        .hp-bar { color: #ff4444; font-weight: bold; } .mp-bar { color: #00d4ff; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div>
        <div id="char-name" style="color:gold">CHOOSE HERO</div>
        <div class="hp-bar" id="stat-hp">HP: --</div>
        <div class="mp-bar" id="stat-mp">MP: --</div>
    </div>
    <div style="font-size: 12px;">
        <div>STR:<span id="s-str">--</span> INT:<span id="s-int">--</span> CON:<span id="s-con">--</span></div>
        <div id="stat-xp" style="color:#4444ff">XP: 0/100</div>
    </div>
    <div id="meta-controls">
        <div style="color:#00ff41; font-weight:bold;">FLOOR: <span id="floor-num">1</span></div>
        <div id="selection-area" style="display:flex; flex-direction:column; gap:5px; align-items:center;">
            <div id="class-select" style="display:flex; gap:5px;">
                <button class="btn" id="btn-Mage" style="width:70px; padding:5px; color:#00d4ff;" onclick="previewClass('Mage', '#00d4ff')">MAGE</button>
                <button class="btn" id="btn-Pala" style="width:70px; padding:5px; color:#fff;" onclick="previewClass('Pala', '#fff')">PALADIN</button>
                <button class="btn" id="btn-Arch" style="width:70px; padding:5px; color:#ffaa00;" onclick="previewClass('Arch', '#ffaa00')">ARCHER</button>
            </div>
            <button id="confirm-start" class="btn" style="display:none; width:220px; background:gold; color:black; border-color:white;" onclick="startGame()">START JOURNEY</button>
        </div>
    </div>
</div>

<div id="game-wrapper">
    <canvas id="gameCanvas" width="900" height="500"></canvas>
    
    <div id="battle-overlay">
        <div class="menu-box">
            <h2 id="battle-title" style="color:red;">BATTLE</h2>
            <div id="battle-stats" style="margin-bottom:10px; border-bottom:1px solid #444; padding-bottom:5px;"></div>
            <div id="main-battle-menu">
                <button class="btn" onclick="playerAction('ATTACK')">ATTACK</button>
                <button class="btn" onclick="toggleSpells(true)">SKILLS</button>
                <button class="btn" onclick="playerAction('HEAL')">HEAL (15MP)</button>
            </div>
            <div id="spell-menu">
                <button class="btn" style="color:orange; grid-column: span 2;" onclick="toggleSpells(false)">BACK</button>
            </div>
            <div id="battle-info" style="color: gold; margin-top:10px;"></div>
        </div>
    </div>

    <div id="merchant-overlay">
        <div class="menu-box">
            <h2 id="m-title">ETHER MERCHANT</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn" onclick="buyItem('mana')">MANA POT (25XP)</button>
                <button class="btn" onclick="buyItem('rest')">REST (15XP)</button>
                <button class="btn" onclick="buyStat('str')">+STR (40XP)</button>
                <button class="btn" onclick="buyStat('int')">+INT (40XP)</button>
                <button class="btn" onclick="buyStat('con')">+CON (40XP)</button>
                <button class="btn" style="color:red; grid-column: span 2;" onclick="closeMerchant()">LEAVE</button>
            </div>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="menu-box" id="modal-content"></div>
    </div>
</div>

<div id="combat-log"></div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const log = document.getElementById('combat-log');
    
    let hero = { active: false, type: '', color: 'white', x: 450, y: 400, speed: 5, hp: 100, maxHP: 100, mp: 50, maxMP: 50, xp: 0, nextXP: 100, level: 1, str: 10, int: 10, con: 10, artifacts: [] };
    let gameState = "SELECT", particles = [], shakeTimer = 0, keys = {}, tempSelection = null;
    let enemies = [], merchant = null, currentEnemy = null;

    const MONSTER_NAMES = ["Void Slime", "Spire Sentinel", "Shadow Knight", "Cursed Remnant", "Static Wraith"];
    const BOSS_NAMES = ["Emerald Watcher", "The Spire Core", "Void Arbiter"];

    // --- KEYBOARD LISTENERS (FIXES MOVEMENT) ---
    window.addEventListener('keydown', (e) => { keys[e.key] = true; });
    window.addEventListener('keyup', (e) => { keys[e.key] = false; });

    function addLog(msg, color) {
        const div = document.createElement('div'); div.style.color = color || 'white';
        div.innerText = `> ${msg}`; log.prepend(div);
    }

    function previewClass(cls, color) {
        tempSelection = { cls, color };
        document.getElementById('confirm-start').style.display = 'block';
        document.getElementById('confirm-start').innerText = `START ${cls.toUpperCase()}`;
    }

    function startGame() {
        if (!tempSelection) return;
        const { cls, color } = tempSelection;
        hero.type = cls; hero.color = color; hero.active = true;
        document.getElementById('selection-area').style.display = 'none';

        if(cls === 'Mage') { hero.int=50; hero.hp=80; hero.maxHP=80; hero.mp=200; hero.maxMP=200; }
        else if(cls === 'Arch') { hero.str=40; hero.hp=110; hero.maxHP=110; hero.mp=80; hero.maxMP=80; hero.speed=7; }
        else { hero.str=30; hero.con=45; hero.hp=200; hero.maxHP=200; hero.mp=60; hero.maxMP=60; hero.speed=4; }

        gameState = "EXPLORE"; spawnFloor(); updateUI();
    }

    function drawHero(x, y) {
        ctx.save();
        if (hero.type === 'Mage') {
            ctx.fillStyle = "#888"; ctx.fillRect(x-10, y, 20, 25);
            ctx.fillStyle = "white"; ctx.fillRect(x-8, y-5, 16, 15);
            ctx.fillStyle = "#555"; ctx.beginPath(); ctx.moveTo(x-15, y-5); ctx.lineTo(x+15, y-5); ctx.lineTo(x, y-25); ctx.fill();
            ctx.strokeStyle = "brown"; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(x+12, y-5); ctx.lineTo(x+18, y+20); ctx.stroke();
        } else if (hero.type === 'Pala') {
            ctx.fillStyle = "#aaa"; ctx.fillRect(x-12, y-5, 24, 30);
            ctx.fillStyle = "gold"; ctx.fillRect(x-10, y-15, 20, 5); ctx.fillRect(x-10, y-20, 4, 10); ctx.fillRect(x+6, y-20, 4, 10);
            ctx.fillStyle = "red"; ctx.fillRect(x-15, y, 5, 25);
            ctx.strokeStyle = "white"; ctx.beginPath(); ctx.moveTo(x+14, y+20); ctx.lineTo(x+14, y-10); ctx.stroke();
        } else if (hero.type === 'Arch') {
            ctx.fillStyle = "#f3e5ab"; ctx.fillRect(x-10, y-5, 20, 30);
            ctx.fillStyle = "gold"; ctx.beginPath(); ctx.arc(x, y-10, 10, 0, Math.PI, true); ctx.fill();
            ctx.strokeStyle = "gold"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(x+15, y+5, 15, -Math.PI/2, Math.PI/2); ctx.stroke();
        }
        // Mini Mana bar for Hero
        ctx.fillStyle = "#333"; ctx.fillRect(x-15, y+28, 30, 3);
        ctx.fillStyle = "cyan"; ctx.fillRect(x-15, y+28, (hero.mp/hero.maxMP)*30, 3);
        ctx.restore();
    }

    function spawnFloor() {
        enemies = [];
        let isArena = (hero.level % 10 === 0);
        document.getElementById('floor-num').innerText = hero.level;
        if(isArena) {
            enemies.push({ 
                name: BOSS_NAMES[Math.floor(Math.random()*BOSS_NAMES.length)],
                x: 450, y: 100, hp: 600+(hero.level*50), maxHP: 600+(hero.level*50), 
                atk: 30+(hero.level*4), alive: true, guardian: true
            });
        } else {
            for(let i=0; i<3; i++) {
                enemies.push({ 
                    name: MONSTER_NAMES[Math.floor(Math.random()*MONSTER_NAMES.length)],
                    x: Math.random()*800+50, y: Math.random()*400+50, 
                    hp: 60+(hero.level*20), maxHP: 60+(hero.level*20), 
                    atk: 10+(hero.level*3), alive: true
                });
            }
        }
    }

    function playerAction(type) {
        let dmg = 0; let crit = (hero.artifacts.includes('Eye') && Math.random() < 0.2);
        if (type === 'ATTACK') {
            dmg = Math.floor(hero.str * 0.8); if(crit) dmg *= 2;
            currentEnemy.hp -= dmg; spawnParticle(450, 150, crit ? `CRIT -${dmg}` : `-${dmg}`, crit?"gold":"white");
        } else if (type === 'HEAL') {
            if(hero.mp < 15) return;
            hero.mp -= 15; let h = 40 + hero.int; hero.hp = Math.min(hero.maxHP, hero.hp+h);
            spawnParticle(450, 350, `+${h} HP`, "#00ff41");
        }
        updateUI(); updateBattleUI(); 
        if(currentEnemy.hp <= 0) victory(); 
        else { document.getElementById('battle-overlay').style.pointerEvents = 'none'; setTimeout(monsterTurn, 600); }
    }

    function monsterTurn() {
        let totalDmg = Math.max(5, currentEnemy.atk - (hero.con/3));
        hero.hp -= totalDmg; spawnParticle(450, 350, `-${Math.floor(totalDmg)}`, "red");
        shakeTimer = 10; updateUI(); updateBattleUI();
        if(hero.hp <= 0) location.reload();
        else document.getElementById('battle-overlay').style.pointerEvents = 'auto';
    }

    function victory() {
        addLog(`DEFEATED ${currentEnemy.name.toUpperCase()}`, "gold");
        document.getElementById('battle-overlay').style.display = 'none';
        document.getElementById('battle-overlay').style.pointerEvents = 'auto';
        currentEnemy.alive = false;
        hero.xp += 50; 
        if(hero.xp >= hero.nextXP) triggerLevelUp();
        else if(enemies.filter(e=>e.alive).length === 0) { hero.level++; spawnFloor(); }
        gameState = "EXPLORE";
    }

    function spawnParticle(x, y, text, color) { particles.push({x, y, text, color, life: 60}); }

    function updateUI() { 
        if(!hero.active) return; 
        document.getElementById('stat-hp').innerText=`HP: ${Math.floor(hero.hp)}/${hero.maxHP}`; 
        document.getElementById('stat-mp').innerText=`MP: ${Math.floor(hero.mp)}/${hero.maxMP}`; 
        document.getElementById('stat-xp').innerText=`XP: ${Math.floor(hero.xp)}/${Math.floor(hero.nextXP)}`; 
        document.getElementById('s-str').innerText=hero.str; document.getElementById('s-int').innerText=hero.int; document.getElementById('s-con').innerText=hero.con; 
        document.getElementById('char-name').innerText=`LVL ${hero.level} ${hero.type.toUpperCase()}`; 
    }
    
    function updateBattleUI() { 
        document.getElementById('battle-title').innerText = `BATTLE: ${currentEnemy.name.toUpperCase()}`;
        document.getElementById('battle-stats').innerHTML = `
            <div style="font-size: 16px; margin-bottom: 8px; color: gold;">VS ${currentEnemy.name}</div>
            <span style="color:cyan">YOU: ${Math.floor(hero.hp)} HP</span> | 
            <span style="color:red">FOE: ${Math.floor(currentEnemy.hp)} HP</span>
        `; 
    }

    function loop() {
        ctx.clearRect(0, 0, 900, 500); ctx.save();
        if(shakeTimer > 0) { ctx.translate(Math.random()*10-5, Math.random()*10-5); shakeTimer--; }
        
        if(hero.active && (gameState === "EXPLORE" || gameState === "BATTLE")) {
            if(gameState === "EXPLORE") {
                if(keys['ArrowUp'] && hero.y > 20) hero.y -= hero.speed;
                if(keys['ArrowDown'] && hero.y < 480) hero.y += hero.speed;
                if(keys['ArrowLeft'] && hero.x > 20) hero.x -= hero.speed;
                if(keys['ArrowRight'] && hero.x < 880) hero.x += hero.speed;
                
                enemies.forEach(en => { 
                    if(en.alive) { 
                        ctx.fillStyle = en.guardian ? "gold" : "red"; 
                        ctx.fillRect(en.x-15, en.y-15, 30, 30); 
                        ctx.fillStyle = "white"; ctx.font = "10px Courier"; 
                        ctx.fillText(en.name, en.x-20, en.y-32);

                        // Monster Mini Health Bar (Green to Red color shift)
                        let hpPerc = en.hp / en.maxHP;
                        ctx.fillStyle = "#333"; ctx.fillRect(en.x-15, en.y-28, 30, 4);
                        ctx.fillStyle = `rgb(${255 * (1 - hpPerc)}, ${255 * hpPerc}, 0)`;
                        ctx.fillRect(en.x-15, en.y-28, hpPerc * 30, 4);
                        
                        if(Math.abs(hero.x-en.x)<25 && Math.abs(hero.y-en.y)<25) { 
                            currentEnemy=en; document.getElementById('battle-overlay').style.display='flex'; 
                            gameState="BATTLE"; updateBattleUI(); 
                        } 
                    } 
                });
            } else if (gameState === "BATTLE") {
                ctx.strokeStyle = "white"; ctx.strokeRect(currentEnemy.x-17, currentEnemy.y-17, 34, 34);
                ctx.fillStyle = currentEnemy.guardian ? "gold" : "red"; ctx.fillRect(currentEnemy.x-15, currentEnemy.y-15, 30, 30);
            }
            drawHero(hero.x, hero.y);
        }
        particles.forEach((p, i) => { ctx.globalAlpha = p.life/60; ctx.fillStyle = p.color; ctx.fillText(p.text, p.x, p.y); p.y--; p.life--; if(p.life<=0) particles.splice(i,1); });
        ctx.restore(); requestAnimationFrame(loop);
    }

    function buyItem(type) {
        if (type === 'mana' && hero.xp >= 25) { hero.xp -= 25; hero.mp = Math.min(hero.maxMP, hero.mp + 50); }
        else if (type === 'rest' && hero.xp >= 15) { hero.xp -= 15; hero.hp = Math.min(hero.maxHP, hero.hp + 40); }
        updateUI();
    }
    function triggerLevelUp() {
        gameState = "MENU"; document.getElementById('modal-overlay').style.display='flex';
        let mc = document.getElementById('modal-content');
        mc.innerHTML = `<h3>LEVEL UP</h3><button class="btn" onclick="finalize()">STR/INT +20</button>`;
    }
    function finalize() { hero.maxHP += 50; hero.hp = hero.maxHP; hero.xp=0; hero.nextXP *= 1.5; document.getElementById('modal-overlay').style.display='none'; if(enemies.filter(e=>e.alive).length===0){hero.level++; spawnFloor();} gameState="EXPLORE"; updateUI(); }
    function toggleSpells(s) { document.getElementById('main-battle-menu').style.display = s?'none':'block'; document.getElementById('spell-menu').style.display = s?'grid':'none'; }

    loop();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EMERALD SPIRE: 3D RPG</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background: #000; color: #00ff41; overflow: hidden; }
        #canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0, 0, 0, 0.8); padding: 15px; border: 2px solid #00ff41; font-size: 14px; }
        #stats { display: flex; gap: 20px; margin-bottom: 10px; }
        .stat { display: flex; flex-direction: column; }
        .label { color: #aaa; font-size: 12px; }
        .value { color: #00ff41; font-weight: bold; }
        #log { position: absolute; bottom: 10px; right: 10px; background: rgba(0, 0, 0, 0.8); padding: 10px; border: 2px solid #444; width: 300px; height: 150px; overflow-y: auto; font-size: 12px; }
        .combat-text { color: #ff4444; }
        .victory-text { color: #00ff00; }
        #controls { position: absolute; bottom: 10px; left: 10px; background: rgba(0, 0, 0, 0.8); padding: 10px; border: 2px solid #444; font-size: 12px; }
    </style>
</head>
<body>

<div id="ui">
    <div id="stats">
        <div class="stat">
            <div class="label">HP</div>
            <div class="value" id="hp">100/100</div>
        </div>
        <div class="stat">
            <div class="label">MP</div>
            <div class="value" id="mp">50/50</div>
        </div>
        <div class="stat">
            <div class="label">FLOOR</div>
            <div class="value" id="floor">1</div>
        </div>
        <div class="stat">
            <div class="label">GOLD</div>
            <div class="value" id="gold">100</div>
        </div>
    </div>
    <div id="mode" style="color: #00ff41;">MODE: EXPLORE</div>
</div>

<div id="log"></div>
<div id="controls">
    <div>WASD - Move | SPACE - Jump</div>
    <div>Mouse - Look Around</div>
    <div>E - Attack | 1,2 - Spells</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    // Scene Setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);
    scene.fog = new THREE.Fog(0x1a1a2e, 100, 200);
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Game State
    let gameState = {
        hp: 100, maxHP: 100, mp: 50, maxMP: 50, floor: 1, gold: 100,
        mode: "EXPLORE", inCombat: false
    };

    // Create Character (Player)
    function createCharacter() {
        const group = new THREE.Group();
        
        // Body
        const bodyGeom = new THREE.CapsuleGeometry(0.4, 1.2, 4, 8);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff6b35 });
        const body = new THREE.Mesh(bodyGeom, bodyMat);
        body.castShadow = true;
        group.add(body);
        
        // Head
        const headGeom = new THREE.SphereGeometry(0.35, 32, 32);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xffaa88 });
        const head = new THREE.Mesh(headGeom, headMat);
        head.position.y = 1.0;
        head.castShadow = true;
        group.add(head);
        
        // Eyes
        const eyeGeom = new THREE.SphereGeometry(0.1, 16, 16);
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
        const leftEye = new THREE.Mesh(eyeGeom, eyeMat);
        leftEye.position.set(-0.12, 1.15, 0.3);
        const rightEye = new THREE.Mesh(eyeGeom, eyeMat);
        rightEye.position.set(0.12, 1.15, 0.3);
        group.add(leftEye);
        group.add(rightEye);
        
        // Arms
        const armGeom = new THREE.CapsuleGeometry(0.15, 0.8, 4, 8);
        const armMat = new THREE.MeshStandardMaterial({ color: 0xffaa88 });
        const leftArm = new THREE.Mesh(armGeom, armMat);
        leftArm.position.set(-0.6, 0.5, 0);
        leftArm.castShadow = true;
        const rightArm = new THREE.Mesh(armGeom, armMat);
        rightArm.position.set(0.6, 0.5, 0);
        rightArm.castShadow = true;
        group.add(leftArm);
        group.add(rightArm);
        
        // Legs
        const legGeom = new THREE.CapsuleGeometry(0.15, 0.9, 4, 8);
        const legMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50 });
        const leftLeg = new THREE.Mesh(legGeom, legMat);
        leftLeg.position.set(-0.25, -0.9, 0);
        leftLeg.castShadow = true;
        const rightLeg = new THREE.Mesh(legGeom, legMat);
        rightLeg.position.set(0.25, -0.9, 0);
        rightLeg.castShadow = true;
        group.add(leftLeg);
        group.add(rightLeg);
        
        // Sword
        const swordGeom = new THREE.BoxGeometry(0.15, 0.8, 0.05);
        const swordMat = new THREE.MeshStandardMaterial({ color: 0xc0c0c0, metalness: 0.8 });
        const sword = new THREE.Mesh(swordGeom, swordMat);
        sword.position.set(0.5, 0.2, 0);
        sword.castShadow = true;
        group.add(sword);
        
        group.position.set(0, 0, 0);
        return group;
    }

    // Create Enemy
    function createEnemy() {
        const group = new THREE.Group();
        
        // Body
        const bodyGeom = new THREE.CapsuleGeometry(0.5, 1.3, 4, 8);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x8B0000 });
        const body = new THREE.Mesh(bodyGeom, bodyMat);
        body.castShadow = true;
        group.add(body);
        
        // Head
        const headGeom = new THREE.SphereGeometry(0.4, 32, 32);
        const headMat = new THREE.MeshStandardMaterial({ color: 0x660000 });
        const head = new THREE.Mesh(headGeom, headMat);
        head.position.y = 1.1;
        head.castShadow = true;
        group.add(head);
        
        // Evil Eyes
        const eyeGeom = new THREE.SphereGeometry(0.12, 16, 16);
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        const leftEye = new THREE.Mesh(eyeGeom, eyeMat);
        leftEye.position.set(-0.15, 1.3, 0.35);
        const rightEye = new THREE.Mesh(eyeGeom, eyeMat);
        rightEye.position.set(0.15, 1.3, 0.35);
        group.add(leftEye);
        group.add(rightEye);
        
        // Horns
        const hornGeom = new THREE.ConeGeometry(0.15, 0.6, 8);
        const hornMat = new THREE.MeshStandardMaterial({ color: 0x404040 });
        const leftHorn = new THREE.Mesh(hornGeom, hornMat);
        leftHorn.position.set(-0.2, 1.6, 0);
        leftHorn.castShadow = true;
        const rightHorn = new THREE.Mesh(hornGeom, hornMat);
        rightHorn.position.set(0.2, 1.6, 0);
        rightHorn.castShadow = true;
        group.add(leftHorn);
        group.add(rightHorn);
        
        group.position.set(15, 0, -10);
        return group;
    }

    // Create Environment
    function createEnvironment() {
        // Ground
        const groundGeom = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d5016 });
        const ground = new THREE.Mesh(groundGeom, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // Sky
        const skyGeom = new THREE.SphereGeometry(200, 32, 32);
        const skyMat = new THREE.MeshBasicMaterial({ color: 0x0a0e27, side: THREE.BackSide });
        const sky = new THREE.Mesh(skyGeom, skyMat);
        scene.add(sky);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(20, 30, 20);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        scene.add(directionalLight);
    }

    // Create Game
    const character = createCharacter();
    scene.add(character);
    
    const enemy = createEnemy();
    scene.add(enemy);
    
    createEnvironment();
    
    camera.position.set(0, 2, 5);
    camera.lookAt(character.position);

    // Input Handling
    const keys = {};
    window.addEventListener('keydown', (e) => {
        keys[e.key.toLowerCase()] = true;
        if (e.key.toLowerCase() === 'e') attack();
        if (e.key === '1') castSpell('spark');
        if (e.key === '2') castSpell('fireball');
    });
    window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

    // Game Functions
    function log(msg, type = "") {
        const logEl = document.getElementById('log');
        const div = document.createElement('div');
        div.className = type;
        div.innerHTML = msg;
        logEl.appendChild(div);
        logEl.scrollTop = logEl.scrollHeight;
    }

    function attack() {
        if (gameState.mode !== "EXPLORE") return;
        const dist = character.position.distanceTo(enemy.position);
        if (dist < 10) {
            gameState.mode = "COMBAT";
            document.getElementById('mode').innerText = "MODE: COMBAT";
            log("⚔️ Combat Started!", "combat-text");
            log("[E] Attack | [1] Spark (10mp) | [2] Fireball (25mp)");
        }
    }

    function castSpell(spell) {
        if (gameState.mode !== "COMBAT") return;
        
        if (spell === 'spark' && gameState.mp >= 10) {
            gameState.mp -= 10;
            const dmg = 25 + gameState.floor * 5;
            gameState.enemy = gameState.enemy || { hp: 50 + gameState.floor * 10, ac: 10 };
            gameState.enemy.hp -= dmg;
            log(`✨ Spark deals ${dmg} damage!`);
            
            if (gameState.enemy.hp <= 0) victory();
            else enemyAttack();
        } else if (spell === 'fireball' && gameState.mp >= 25) {
            gameState.mp -= 25;
            const dmg = 60 + gameState.floor * 10;
            gameState.enemy = gameState.enemy || { hp: 50 + gameState.floor * 10 };
            gameState.enemy.hp -= dmg;
            log(`🔥 Fireball deals ${dmg} damage!`);
            
            if (gameState.enemy.hp <= 0) victory();
            else enemyAttack();
        }
        updateUI();
    }

    function enemyAttack() {
        const dmg = Math.floor(Math.random() * 20) + 5;
        gameState.hp -= dmg;
        log(`💥 Enemy deals ${dmg} damage!`, "combat-text");
        if (gameState.hp <= 0) {
            log("💀 You Died! Restarting...");
            setTimeout(() => location.reload(), 2000);
        }
        updateUI();
    }

    function victory() {
        gameState.floor++;
        gameState.gold += 50 + gameState.floor * 10;
        gameState.hp = gameState.maxHP;
        gameState.mp = gameState.maxMP;
        gameState.mode = "EXPLORE";
        document.getElementById('mode').innerText = "MODE: EXPLORE";
        
        enemy.position.set(10 + Math.random() * 30, 0, -20 + Math.random() * 20);
        log("✅ Victory!", "victory-text");
        log(`Floor ${gameState.floor} - Gold: ${gameState.gold}`);
        updateUI();
    }

    function updateUI() {
        document.getElementById('hp').innerText = `${gameState.hp}/${gameState.maxHP}`;
        document.getElementById('mp').innerText = `${gameState.mp}/${gameState.maxMP}`;
        document.getElementById('floor').innerText = gameState.floor;
        document.getElementById('gold').innerText = gameState.gold;
    }

    // Game Loop
    function animate() {
        requestAnimationFrame(animate);

        // Movement
        if (keys['w'] || keys['arrowup']) character.position.z -= 0.2;
        if (keys['s'] || keys['arrowdown']) character.position.z += 0.2;
        if (keys['a'] || keys['arrowleft']) character.position.x -= 0.2;
        if (keys['d'] || keys['arrowright']) character.position.x += 0.2;

        // Camera follow
        camera.position.x += (character.position.x - camera.position.x) * 0.1;
        camera.position.z += (character.position.z + 5 - camera.position.z) * 0.1;
        camera.lookAt(character.position.x, character.position.y + 1, character.position.z);

        // Combat distance check
        const dist = character.position.distanceTo(enemy.position);
        if (dist < 15 && gameState.mode === "EXPLORE") {
            log("⚠️ Enemy Nearby! Press E to Attack", "combat-text");
        }

        renderer.render(scene, camera);
    }

    // Handle window resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateUI();
    animate();
</script>

</body>
</html>

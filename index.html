<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMERALD SPIRE: 3D RPG - Panda Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Arial', sans-serif; 
            background: #000; 
            color: #00ff41; 
            overflow: hidden; 
        }
        canvas { 
            display: block; 
            width: 100vw; 
            height: 100vh; 
        }
        #ui { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            background: rgba(0, 0, 0, 0.9); 
            padding: 15px; 
            border: 2px solid #00ff41; 
            font-size: 14px; 
            z-index: 10;
        }
        #stats { 
            display: flex; 
            gap: 20px; 
            margin-bottom: 10px; 
        }
        .stat { 
            display: flex; 
            flex-direction: column; 
        }
        .label { 
            color: #aaa; 
            font-size: 12px; 
        }
        .value { 
            color: #00ff41; 
            font-weight: bold; 
        }
        #minimap { 
            position: absolute; 
            top: 10px; 
            right: 10px; 
            width: 220px; 
            height: 220px; 
            background: rgba(0, 0, 0, 0.9); 
            border: 2px solid #00ff41; 
            z-index: 10;
        }
        #minimapCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #log { 
            position: absolute; 
            bottom: 10px; 
            right: 10px; 
            background: rgba(0, 0, 0, 0.9); 
            padding: 10px; 
            border: 2px solid #444; 
            width: 350px; 
            height: 150px; 
            overflow-y: auto; 
            font-size: 12px;
            z-index: 10;
        }
        .combat-text { color: #ff4444; }
        .victory-text { color: #00ff00; }
        .system-text { color: #aaa; font-style: italic; }
        #controls { 
            position: absolute; 
            bottom: 10px; 
            left: 10px; 
            background: rgba(0, 0, 0, 0.9); 
            padding: 10px; 
            border: 2px solid #444; 
            font-size: 12px;
            z-index: 10;
        }
    </style>
</head>
<body>

<div id="ui">
    <div id="stats">
        <div class="stat">
            <div class="label">HP</div>
            <div class="value" id="hp">100/100</div>
        </div>
        <div class="stat">
            <div class="label">MP</div>
            <div class="value" id="mp">50/50</div>
        </div>
        <div class="stat">
            <div class="label">FLOOR</div>
            <div class="value" id="floor">1</div>
        </div>
        <div class="stat">
            <div class="label">GOLD</div>
            <div class="value" id="gold">100</div>
        </div>
    </div>
    <div id="mode" style="color: #00ff41;">MODE: EXPLORE</div>
</div>

<div id="minimap">
    <canvas id="minimapCanvas" width="220" height="220"></canvas>
</div>

<div id="log"></div>

<div id="controls">
    <div><strong>CONTROLS:</strong></div>
    <div>WASD - Move | E - Attack</div>
    <div>1,2 - Cast Spells | SPACE - Jump</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    // ===== SCENE SETUP =====
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);
    scene.fog = new THREE.Fog(0x1a1a2e, 150, 300);
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFShadowShadowMap;
    document.body.appendChild(renderer.domElement);

    // ===== GAME STATE =====
    let gameState = {
        hp: 100, maxHP: 100, mp: 50, maxMP: 50, floor: 1, gold: 100,
        mode: "EXPLORE", inCombat: false, enemy: null
    };

    // ===== CREATE CHARACTER =====
    function createCharacter() {
        const group = new THREE.Group();
        
        // Body
        const bodyGeom = new THREE.CapsuleGeometry(0.4, 1.2, 4, 8);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff6b35, roughness: 0.7 });
        const body = new THREE.Mesh(bodyGeom, bodyMat);
        body.castShadow = true;
        body.receiveShadow = true;
        group.add(body);
        
        // Head
        const headGeom = new THREE.SphereGeometry(0.35, 32, 32);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xffaa88, roughness: 0.6 });
        const head = new THREE.Mesh(headGeom, headMat);
        head.position.y = 1.0;
        head.castShadow = true;
        head.receiveShadow = true;
        group.add(head);
        
        // Eyes
        const eyeGeom = new THREE.SphereGeometry(0.1, 16, 16);
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
        const leftEye = new THREE.Mesh(eyeGeom, eyeMat);
        leftEye.position.set(-0.12, 1.15, 0.3);
        const rightEye = new THREE.Mesh(eyeGeom, eyeMat);
        rightEye.position.set(0.12, 1.15, 0.3);
        group.add(leftEye);
        group.add(rightEye);
        
        // Arms
        const armGeom = new THREE.CapsuleGeometry(0.15, 0.8, 4, 8);
        const armMat = new THREE.MeshStandardMaterial({ color: 0xffaa88 });
        const leftArm = new THREE.Mesh(armGeom, armMat);
        leftArm.position.set(-0.6, 0.5, 0);
        leftArm.castShadow = true;
        const rightArm = new THREE.Mesh(armGeom, armMat);
        rightArm.position.set(0.6, 0.5, 0);
        rightArm.castShadow = true;
        group.add(leftArm);
        group.add(rightArm);
        
        // Legs
        const legGeom = new THREE.CapsuleGeometry(0.15, 0.9, 4, 8);
        const legMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50 });
        const leftLeg = new THREE.Mesh(legGeom, legMat);
        leftLeg.position.set(-0.25, -0.9, 0);
        leftLeg.castShadow = true;
        const rightLeg = new THREE.Mesh(legGeom, legMat);
        rightLeg.position.set(0.25, -0.9, 0);
        rightLeg.castShadow = true;
        group.add(leftLeg);
        group.add(rightLeg);
        
        // Sword
        const swordGeom = new THREE.BoxGeometry(0.15, 0.8, 0.05);
        const swordMat = new THREE.MeshStandardMaterial({ color: 0xc0c0c0, metalness: 0.9, roughness: 0.2 });
        const sword = new THREE.Mesh(swordGeom, swordMat);
        sword.position.set(0.5, 0.2, 0);
        sword.castShadow = true;
        group.add(sword);
        
        group.position.set(0, 0, 0);
        return group;
    }

    // ===== CREATE ENEMY =====
    function createEnemy() {
        const group = new THREE.Group();
        
        // Body
        const bodyGeom = new THREE.CapsuleGeometry(0.5, 1.3, 4, 8);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x8B0000, roughness: 0.7 });
        const body = new THREE.Mesh(bodyGeom, bodyMat);
        body.castShadow = true;
        body.receiveShadow = true;
        group.add(body);
        
        // Head
        const headGeom = new THREE.SphereGeometry(0.4, 32, 32);
        const headMat = new THREE.MeshStandardMaterial({ color: 0x660000, roughness: 0.7 });
        const head = new THREE.Mesh(headGeom, headMat);
        head.position.y = 1.1;
        head.castShadow = true;
        head.receiveShadow = true;
        group.add(head);
        
        // Evil Eyes
        const eyeGeom = new THREE.SphereGeometry(0.12, 16, 16);
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.5 });
        const leftEye = new THREE.Mesh(eyeGeom, eyeMat);
        leftEye.position.set(-0.15, 1.3, 0.35);
        const rightEye = new THREE.Mesh(eyeGeom, eyeMat);
        rightEye.position.set(0.15, 1.3, 0.35);
        group.add(leftEye);
        group.add(rightEye);
        
        // Horns
        const hornGeom = new THREE.ConeGeometry(0.15, 0.6, 8);
        const hornMat = new THREE.MeshStandardMaterial({ color: 0x404040, roughness: 0.8 });
        const leftHorn = new THREE.Mesh(hornGeom, hornMat);
        leftHorn.position.set(-0.2, 1.6, 0);
        leftHorn.castShadow = true;
        const rightHorn = new THREE.Mesh(hornGeom, hornMat);
        rightHorn.position.set(0.2, 1.6, 0);
        rightHorn.castShadow = true;
        group.add(leftHorn);
        group.add(rightHorn);
        
        group.position.set(20, 0, -15);
        return group;
    }

    // ===== CREATE PROCEDURAL TERRAIN =====
    function createTerrain() {
        const terrainGeom = new THREE.PlaneGeometry(200, 200, 64, 64);
        const positions = terrainGeom.getAttribute('position');
        const posArray = positions.array;
        
        // Simple Perlin-like noise for terrain
        for (let i = 0; i < posArray.length; i += 3) {
            const x = posArray[i];
            const y = posArray[i + 1];
            
            let height = 0;
            let scale = 20;
            let amplitude = 10;
            
            for (let j = 0; j < 4; j++) {
                height += Math.sin(x / scale) * amplitude + Math.cos(y / scale) * amplitude;
                scale /= 2;
                amplitude /= 2;
            }
            
            posArray[i + 2] = height;
        }
        
        positions.needsUpdate = true;
        terrainGeom.computeVertexNormals();
        
        const terrainMat = new THREE.MeshStandardMaterial({ 
            color: 0x2d5016, 
            roughness: 0.8,
            map: null
        });
        const terrain = new THREE.Mesh(terrainGeom, terrainMat);
        terrain.receiveShadow = true;
        terrain.rotation.x = -Math.PI / 2;
        
        return terrain;
    }

    // ===== CREATE ENVIRONMENT =====
    function createEnvironment() {
        // Terrain
        const terrain = createTerrain();
        scene.add(terrain);
        
        // Sky
        const skyGeom = new THREE.SphereGeometry(300, 32, 32);
        const skyMat = new THREE.MeshBasicMaterial({ color: 0x0a0e27, side: THREE.BackSide });
        const sky = new THREE.Mesh(skyGeom, skyMat);
        scene.add(sky);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(50, 60, 50);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        directionalLight.shadow.camera.far = 200;
        directionalLight.shadow.camera.left = -100;
        directionalLight.shadow.camera.right = 100;
        directionalLight.shadow.camera.top = 100;
        directionalLight.shadow.camera.bottom = -100;
        scene.add(directionalLight);
        
        // Point lights for atmosphere
        const pointLight = new THREE.PointLight(0xff6b35, 0.5, 100);
        pointLight.position.set(20, 5, 0);
        scene.add(pointLight);
    }

    // ===== INITIALIZE GAME =====
    const character = createCharacter();
    scene.add(character);
    
    const enemy = createEnemy();
    scene.add(enemy);
    
    createEnvironment();
    
    camera.position.set(0, 3, 8);
    camera.lookAt(character.position);

    // ===== INPUT HANDLING =====
    const keys = {};
    window.addEventListener('keydown', (e) => {
        keys[e.key.toLowerCase()] = true;
        if (e.key.toLowerCase() === 'e') attack();
        if (e.key === '1') castSpell('spark');
        if (e.key === '2') castSpell('fireball');
    });
    window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

    // ===== GAME FUNCTIONS =====
    function log(msg, type = "") {
        const logEl = document.getElementById('log');
        const div = document.createElement('div');
        div.className = type;
        div.innerHTML = msg;
        logEl.appendChild(div);
        logEl.scrollTop = logEl.scrollHeight;
    }

    function attack() {
        if (gameState.mode !== "EXPLORE") return;
        const dist = character.position.distanceTo(enemy.position);
        if (dist < 15) {
            gameState.mode = "COMBAT";
            gameState.enemy = { hp: 50 + gameState.floor * 10, maxHP: 50 + gameState.floor * 10, ac: 10 };
            document.getElementById('mode').innerText = "MODE: COMBAT";
            log("⚔️ Combat Started!", "combat-text");
            log("[1] Spark (10mp) | [2] Fireball (25mp)");
        }
    }

    function castSpell(spell) {
        if (gameState.mode !== "COMBAT" || !gameState.enemy) return;
        
        if (spell === 'spark' && gameState.mp >= 10) {
            gameState.mp -= 10;
            const dmg = 25 + gameState.floor * 5;
            gameState.enemy.hp -= dmg;
            log(`✨ Spark deals ${dmg} damage!`);
            
            if (gameState.enemy.hp <= 0) victory();
            else enemyAttack();
        } else if (spell === 'fireball' && gameState.mp >= 25) {
            gameState.mp -= 25;
            const dmg = 60 + gameState.floor * 10;
            gameState.enemy.hp -= dmg;
            log(`🔥 Fireball deals ${dmg} damage!`);
            
            if (gameState.enemy.hp <= 0) victory();
            else enemyAttack();
        }
        updateUI();
    }

    function enemyAttack() {
        const dmg = Math.floor(Math.random() * 25) + 10;
        gameState.hp -= dmg;
        log(`💥 Enemy deals ${dmg} damage!`, "combat-text");
        if (gameState.hp <= 0) {
            log("💀 You Died! Restarting...");
            setTimeout(() => location.reload(), 2000);
        }
        updateUI();
    }

    function victory() {
        gameState.floor++;
        gameState.gold += 50 + gameState.floor * 10;
        gameState.hp = gameState.maxHP;
        gameState.mp = gameState.maxMP;
        gameState.mode = "EXPLORE";
        gameState.enemy = null;
        document.getElementById('mode').innerText = "MODE: EXPLORE";
        
        enemy.position.set(15 + Math.random() * 40, 0, -20 + Math.random() * 40);
        log("✅ Victory!", "victory-text");
        log(`Floor ${gameState.floor} - Gold: ${gameState.gold}`, "victory-text");
        updateUI();
    }

    function updateUI() {
        document.getElementById('hp').innerText = `${gameState.hp}/${gameState.maxHP}`;
        document.getElementById('mp').innerText = `${gameState.mp}/${gameState.maxMP}`;
        document.getElementById('floor').innerText = gameState.floor;
        document.getElementById('gold').innerText = gameState.gold;
    }

    // ===== MINIMAP SYSTEM =====
    function updateMinimap() {
        const canvas = document.getElementById('minimapCanvas');
        const ctx = canvas.getContext('2d');
        const scale = 0.5;
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        
        // Clear
        ctx.fillStyle = '#111111';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Border
        ctx.strokeStyle = '#00ff41';
        ctx.lineWidth = 2;
        ctx.strokeRect(0, 0, canvas.width, canvas.height);
        
        // Terrain background
        ctx.fillStyle = '#1a3a1a';
        ctx.fillRect(2, 2, canvas.width - 4, canvas.height - 4);
        
        // Player (center)
        ctx.fillStyle = '#00ff41';
        ctx.beginPath();
        ctx.arc(centerX, centerY, 5, 0, Math.PI * 2);
        ctx.fill();
        
        // Enemy
        const relEnemyX = (enemy.position.x - character.position.x) * scale + centerX;
        const relEnemyZ = (enemy.position.z - character.position.z) * scale + centerY;
        
        if (relEnemyX > 0 && relEnemyX < canvas.width && relEnemyZ > 0 && relEnemyZ < canvas.height) {
            ctx.fillStyle = '#ff4444';
            ctx.beginPath();
            ctx.arc(relEnemyX, relEnemyZ, 5, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Compass
        ctx.fillStyle = '#666666';
        ctx.font = 'bold 10px Arial';
        ctx.fillText('N', centerX - 5, 15);
    }

    // ===== GAME LOOP =====
    function animate() {
        requestAnimationFrame(animate);

        // Movement
        const moveSpeed = 0.3;
        if (keys['w'] || keys['arrowup']) character.position.z -= moveSpeed;
        if (keys['s'] || keys['arrowdown']) character.position.z += moveSpeed;
        if (keys['a'] || keys['arrowleft']) character.position.x -= moveSpeed;
        if (keys['d'] || keys['arrowright']) character.position.x += moveSpeed;

        // Keep character on terrain
        character.position.y = 0;

        // Camera follow
        const targetX = character.position.x;
        const targetZ = character.position.z + 8;
        camera.position.x += (targetX - camera.position.x) * 0.1;
        camera.position.z += (targetZ - camera.position.z) * 0.1;
        camera.position.y = 3;
        camera.lookAt(character.position.x, 1, character.position.z);

        // Combat distance check
        const dist = character.position.distanceTo(enemy.position);
        if (dist < 20 && gameState.mode === "EXPLORE") {
            log("⚠️ Enemy Nearby! Press E to Attack", "system-text");
        }

        // Update minimap
        updateMinimap();

        renderer.render(scene, camera);
    }

    // Handle window resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateUI();
    log("Welcome to Emerald Spire!", "system-text");
    log("Find the enemy and press E to attack!", "system-text");
    animate();
</script>

</body>
</html>
